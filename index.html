<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trust Group</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Arial, sans-serif; background: #f2f2f2; color: #1a1a1a; min-height: 100vh; }

    /* TOP NAV */
    .topnav { position: fixed; top: 0; left: 0; right: 0; height: 60px; background: #fff; border-bottom: 1px solid #e5e5e5; display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; z-index: 200; }
    .topnav-logo { height: 44px; object-fit: contain; }
    .topnav-tabs { display: flex; gap: 4px; }
    .tab-btn { padding: 7px 18px; border-radius: 8px; border: 1px solid transparent; cursor: pointer; font-size: 14px; font-family: inherit; background: transparent; color: #666; transition: all 0.15s; white-space: nowrap; }
    .tab-btn:hover { background: #f5f5f5; color: #1a1a1a; }
    .tab-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

    /* LAYOUT */
    .layout { display: flex; padding-top: 60px; min-height: 100vh; }
    .sidebar { position: fixed; top: 60px; right: 0; width: 230px; height: calc(100vh - 60px); background: #fff; border-left: 1px solid #e5e5e5; display: flex; flex-direction: column; z-index: 100; }
    .sidebar-header { padding: 1rem; border-bottom: 1px solid #f0f0f0; }
    .sidebar-title { font-size: 14px; font-weight: 600; margin-bottom: 8px; color: #888; }
    .btn-new-page { width: 100%; padding: 8px; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-family: inherit; cursor: pointer; }
    .btn-new-page:hover { background: #333; }
    .pages-list { flex: 1; overflow-y: auto; padding: 8px; }
    .page-item { display: flex; align-items: center; justify-content: space-between; padding: 9px 10px; border-radius: 8px; cursor: pointer; font-size: 14px; margin-bottom: 2px; }
    .page-item:hover { background: #f5f5f5; }
    .page-item.active { background: #f0f0f0; font-weight: 500; }
    .page-item-left { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
    .page-item-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 13px; }
    .page-item-bal { font-size: 11px; color: #888; }
    .page-item-bal.pos { color: #c0392b; }
    .page-item-bal.neg { color: #27ae60; }
    .btn-del-page { background: none; border: none; cursor: pointer; color: #ccc; font-size: 15px; padding: 2px 4px; flex-shrink: 0; }
    .btn-del-page:hover { color: #e74c3c; }
    .sidebar-footer { padding: 8px 10px; border-top: 1px solid #f0f0f0; font-size: 11px; color: #bbb; text-align: center; }

    .main { margin-right: 230px; padding: 1.5rem; flex: 1; }

    /* SECTIONS */
    .section { display: none; }
    .section.active { display: block; }

    /* WELCOME */
    .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 50vh; color: #bbb; text-align: center; gap: 10px; }
    .welcome h2 { font-size: 17px; font-weight: 500; color: #888; }

    /* METRICS */
    .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1.25rem; }
    .metric { background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; padding: .9rem; text-align: center; }
    .metric-label { font-size: 11px; color: #888; margin-bottom: 5px; }
    .metric-val { font-size: 20px; font-weight: 600; }
    .metric-val.red { color: #c0392b; }
    .metric-val.green { color: #27ae60; }

    /* CARD */
    .card { background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
    .card-title { font-size: 14px; font-weight: 500; margin-bottom: 10px; }

    /* INPUTS */
    .input-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    input[type="number"], input[type="text"], input[type="date"], input[type="time"], select {
      border: 1px solid #ddd; border-radius: 8px; padding: 7px 11px; font-size: 13px; outline: none;
      background: #fafafa; color: #1a1a1a; font-family: inherit;
    }
    input:focus, select:focus { border-color: #aaa; background: #fff; }
    .w-100 { width: 100%; }

    /* BUTTONS */
    .btn { padding: 7px 15px; border-radius: 8px; border: 1px solid #ddd; cursor: pointer; font-size: 13px; font-family: inherit; background: #fff; color: #1a1a1a; }
    .btn:hover { background: #f5f5f5; }
    .btn-red { border-color: #e74c3c; color: #c0392b; }
    .btn-red:hover { background: #fff0ef; }
    .btn-green { border-color: #2ecc71; color: #27ae60; }
    .btn-green:hover { background: #edfbf3; }
    .btn-dark { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
    .btn-dark:hover { background: #333; }
    .btn-sm { font-size: 11px; padding: 4px 9px; color: #999; border-color: #e5e5e5; }

    /* TABLE */
    .tbl-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #f8f8f8; padding: 8px 10px; text-align: right; font-weight: 500; color: #555; border-bottom: 1px solid #e5e5e5; white-space: nowrap; }
    td { padding: 8px 10px; border-bottom: 1px solid #f5f5f5; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }

    /* BADGES */
    .badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 9px; border-radius: 5px; }
    .badge-buy { background: #fff0ef; color: #c0392b; }
    .badge-pay { background: #edfbf3; color: #27ae60; }
    .badge-present { background: #edfbf3; color: #27ae60; }
    .badge-absent { background: #fff0ef; color: #c0392b; }

    /* PAGE TOP */
    .page-top { display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .page-name-display { font-size: 19px; font-weight: 600; cursor: pointer; border-bottom: 2px dashed transparent; }
    .page-name-display:hover { border-color: #ddd; }
    .page-name-input { font-size: 19px; font-weight: 600; border: none; border-bottom: 2px solid #1a1a1a; outline: none; background: transparent; font-family: inherit; color: #1a1a1a; width: 180px; }

    /* TOAST */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: #fff; padding: 9px 18px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
    .toast.show { opacity: 1; }

    /* SALARY EMPLOYEE CARD */
    .emp-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; margin-bottom: 1rem; overflow: hidden; }
    .emp-card-header { display: flex; align-items: center; justify-content: space-between; padding: .8rem 1.1rem; cursor: pointer; background: #fafafa; border-bottom: 1px solid #f0f0f0; }
    .emp-card-header:hover { background: #f5f5f5; }
    .emp-card-name { font-size: 15px; font-weight: 600; }
    .emp-card-summary { font-size: 12px; color: #888; margin-top: 2px; }
    .emp-card-body { padding: 1rem 1.1rem; display: none; }
    .emp-card-body.open { display: block; }
    .emp-meta { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 1rem; font-size: 13px; color: #555; }
    .emp-meta span { background: #f5f5f5; padding: 4px 10px; border-radius: 6px; }

    /* MOBILE */
    .mobile-menu-btn { display: none; position: fixed; top: 68px; right: 10px; z-index: 199; background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 5px 9px; font-size: 16px; cursor: pointer; }

    @media (max-width: 700px) {
      /* sidebar */
      .sidebar { transform: translateX(100%); transition: transform 0.2s; top: 60px; }
      .sidebar.open { transform: translateX(0); }
      .main { margin-right: 0; padding: .75rem; padding-top: 1rem; }
      .mobile-menu-btn { display: block; }

      /* topnav */
      .topnav { padding: 0 .6rem; gap: 6px; }
      .topnav-logo { height: 34px; }
      .topnav-tabs { gap: 2px; }
      .tab-btn { padding: 5px 8px; font-size: 11px; border-radius: 6px; }

      /* metrics */
      .metrics { grid-template-columns: 1fr 1fr; }
      .metric:last-child { grid-column: span 2; }
      .metric-val { font-size: 16px; }

      /* inputs stack vertically */
      .input-row { flex-direction: column; align-items: stretch; }
      .input-row input, .input-row select, .input-row button { width: 100% !important; }

      /* tables scroll horizontally */
      .tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
      table { min-width: 480px; }
      th, td { padding: 6px 8px; font-size: 12px; }

      /* emp card */
      .emp-card-header { flex-wrap: wrap; gap: 6px; }
      .emp-card-name { font-size: 14px; }
      .emp-card-summary { font-size: 11px; }
      .emp-card-body { padding: .75rem; }
      .emp-meta { gap: 8px; }
      .emp-meta span { font-size: 12px; padding: 3px 8px; }

      /* page top */
      .page-top { flex-wrap: wrap; gap: 6px; }
      .page-name-display { font-size: 16px; }

      /* card padding */
      .card { padding: .75rem; }
      .card-title { font-size: 13px; }
    }
  </style>
</head>

<div class="layout">

    </div>
    <div class="pages-list" id="pages-list"><p style="font-size:13px;color:#bbb;text-align:center;padding:1rem;">جار التحميل...</p></div>
    <div class="sidebar-footer" id="sync-status">🔄 جار الاتصال...</div>
  </div>

  <!-- MAIN -->

      <div id="customers-pages"></div>

      <div id="salaries-welcome" class="welcome"><h2>👋 اختر قسماً أو أضف موظفين</h2></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, doc, addDoc, setDoc, deleteDoc, updateDoc,
  onSnapshot, query, orderBy, serverTimestamp, writeBatch
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCdT6hp9NQvCee1R-IkjCEE4mx3m483VDw",
  authDomain: "trust-group-3796d.firebaseapp.com",
  projectId: "trust-group-3796d",
  storageBucket: "trust-group-3796d.firebasestorage.app",
  messagingSenderId: "1096868997914",
  appId: "1:1096868997914:web:05bd68204a10749ebf5aa3"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ==================== STATE ====================
let currentSection = 'debtors';
let currentPage = { debtors: null, customers: null, salaries: null };
// pages[section][id] = { id, name, entries:{} }
let pages = { debtors: {}, customers: {}, salaries: {} };
// salaries: employees[deptId][empId] = { id, name, dailyRate, overtimeRate, advances:[], attendance:[] }
let employees = {}; // deptId -> { empId -> empData }

// ==================== UTILS ====================
function fmt(n) { return Number(n||0).toLocaleString('ar-EG'); }
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

// ==================== SECTION SWITCH ====================
window.switchSection = function(sec, btn) {
  currentSection = sec;
  document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
  document.getElementById('section-' + sec).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const labels = { debtors:'المدين', customers:'حسابات العملاء', salaries:'المرتبات' };
  const addLabels = { debtors:'+ إضافة حساب', customers:'+ إضافة عميل', salaries:'+ إضافة قسم' };
  document.getElementById('sidebar-label').textContent = labels[sec];
  document.getElementById('sidebar-add-btn').textContent = addLabels[sec];
  renderSidebar();
};

window.sidebarAdd = function() {
  if (currentSection === 'salaries') newSalaryDept();
  else newPage(currentSection);
};

window.toggleSidebar = function() { document.getElementById('sidebar').classList.toggle('open'); };
window.closeSidebar  = function() { document.getElementById('sidebar').classList.remove('open'); };

// ==================== FIRESTORE LISTENERS ====================
function listenSection(section) {
  onSnapshot(query(collection(db, section), orderBy('createdAt')), snap => {
    const ids = snap.docs.map(d => d.id);
    Object.keys(pages[section]).forEach(id => {
      if (!ids.includes(id)) {
        delete pages[section][id];
        const el = document.getElementById(section+'-page-'+id);
        if (el) el.remove();
        if (currentPage[section] === id) {
          currentPage[section] = null;
          showWelcome(section);
        }
      }
    });
    snap.docs.forEach(d => {
      if (!pages[section][d.id]) {
        pages[section][d.id] = { id: d.id, name: d.data().name, entries: {} };
        listenEntries(section, d.id);
      } else {
        pages[section][d.id].name = d.data().name;
      }
    });
    renderSidebar();
    document.getElementById('sync-status').textContent = '🟢 متصل';
  }, () => { document.getElementById('sync-status').textContent = '🔴 خطأ في الاتصال'; });
}

function listenEntries(section, pageId) {
  onSnapshot(query(collection(db, section, pageId, 'entries'), orderBy('createdAt')), snap => {
    if (!pages[section][pageId]) return;
    pages[section][pageId].entries = {};
    snap.docs.forEach(d => { pages[section][pageId].entries[d.id] = { id: d.id, ...d.data() }; });
    renderSidebar();
    renderPageContent(section, pageId);
    if (!currentPage[section]) openPage(section, pageId);
  });
}

// ---- SALARIES listeners ----
function listenSalaryDepts() {
  onSnapshot(query(collection(db, 'salaries'), orderBy('createdAt')), snap => {
    const ids = snap.docs.map(d => d.id);
    Object.keys(pages.salaries).forEach(id => {
      if (!ids.includes(id)) {
        delete pages.salaries[id];
        delete employees[id];
        const el = document.getElementById('salaries-page-'+id);
        if (el) el.remove();
        if (currentPage.salaries === id) { currentPage.salaries = null; showWelcome('salaries'); }
      }
    });
    snap.docs.forEach(d => {
      if (!pages.salaries[d.id]) {
        pages.salaries[d.id] = { id: d.id, name: d.data().name, entries: {} };
        employees[d.id] = {};
        listenEmployees(d.id);
      } else {
        pages.salaries[d.id].name = d.data().name;
      }
    });
    renderSidebar();
  });
}

function listenEmployees(deptId) {
  onSnapshot(query(collection(db, 'salaries', deptId, 'employees'), orderBy('createdAt')), snap => {
    if (!employees[deptId]) employees[deptId] = {};
    snap.docs.forEach(d => {
      if (!employees[deptId][d.id]) employees[deptId][d.id] = { id: d.id, ...d.data(), attendance: {}, advances: {} };
      else { employees[deptId][d.id] = { ...employees[deptId][d.id], ...d.data() }; }
      listenAttendance(deptId, d.id);
      listenAdvances(deptId, d.id);
    });
    const ids = snap.docs.map(d => d.id);
    Object.keys(employees[deptId]).forEach(id => { if (!ids.includes(id)) delete employees[deptId][id]; });
    renderSalaryPage(deptId);
    if (!currentPage.salaries) openPage('salaries', deptId);
  });
}

function listenAttendance(deptId, empId) {
  onSnapshot(query(collection(db,'salaries',deptId,'employees',empId,'attendance'), orderBy('date')), snap => {
    if (!employees[deptId]?.[empId]) return;
    employees[deptId][empId].attendance = {};
    snap.docs.forEach(d => { employees[deptId][empId].attendance[d.id] = { id: d.id, ...d.data() }; });
    renderSalaryPage(deptId);
  });
}

function listenAdvances(deptId, empId) {
  onSnapshot(query(collection(db,'salaries',deptId,'employees',empId,'advances'), orderBy('createdAt')), snap => {
    if (!employees[deptId]?.[empId]) return;
    employees[deptId][empId].advances = {};
    snap.docs.forEach(d => { employees[deptId][empId].advances[d.id] = { id: d.id, ...d.data() }; });
    renderSalaryPage(deptId);
  });
}

// ==================== PAGE CRUD (debtors/customers) ====================
window.newPage = async function(section) {
  const name = prompt('الاسم:');
  if (!name?.trim()) return;
  await addDoc(collection(db, section), { name: name.trim(), createdAt: serverTimestamp() });
  toast('✅ تمت الإضافة');
};

window.deletePage = async function(section, id) {
  const page = pages[section][id];
  if (!confirm('حذف "' + (page?.name||'') + '"؟')) return;
  const batch = writeBatch(db);
  Object.keys(page.entries||{}).forEach(eid => batch.delete(doc(db, section, id, 'entries', eid)));
  batch.delete(doc(db, section, id));
  await batch.commit(); toast('🗑 تم الحذف');
};

window.renamePage = function(section, id) {
  document.getElementById('nd-'+section+id).style.display='none';
  const inp = document.getElementById('ni-'+section+id);
  inp.style.display='inline-block'; inp.focus(); inp.select();
};
window.finishRename = async function(section, id) {
  const inp = document.getElementById('ni-'+section+id);
  const newName = inp.value.trim();
  if (newName && pages[section][id] && newName !== pages[section][id].name) {
    await setDoc(doc(db, section, id), { name: newName }, { merge: true }); toast('✏️ تم التعديل');
  }
  const nd = document.getElementById('nd-'+section+id);
  if (nd) { nd.textContent = pages[section][id]?.name||''; nd.style.display='inline'; inp.style.display='none'; }
};

window.addEntry = async function(section, pageId, type) {
  const amt  = parseFloat(document.getElementById('amt-'+pageId).value);
  const note = document.getElementById('note-'+pageId).value.trim();
  if (!amt || amt<=0) { alert('ادخل مبلغ صحيح'); return; }
  await addDoc(collection(db, section, pageId, 'entries'), {
    type, amount: amt, note,
    time: new Date().toLocaleString('ar-EG',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit'}),
    createdAt: serverTimestamp()
  });
  document.getElementById('amt-'+pageId).value='';
  document.getElementById('note-'+pageId).value='';
  toast(type==='buy'?'🛒 تم إضافة شراء':'✅ تم إضافة سداد');
};

window.deleteEntry = async function(section, pageId, entryId) {
  await deleteDoc(doc(db, section, pageId, 'entries', entryId)); toast('🗑 تم الحذف');
};

window.clearEntries = async function(section, pageId) {
  const page = pages[section][pageId];
  if (!page || !Object.keys(page.entries).length) return;
  if (!confirm('مسح كل السجل؟')) return;
  const batch = writeBatch(db);
  Object.keys(page.entries).forEach(eid => batch.delete(doc(db, section, pageId, 'entries', eid)));
  await batch.commit(); toast('🗑 تم المسح');
};

// ==================== SALARY DEPT CRUD ====================
window.newSalaryDept = async function() {
  const name = prompt('اسم القسم أو المجموعة:');
  if (!name?.trim()) return;
  await addDoc(collection(db,'salaries'), { name: name.trim(), createdAt: serverTimestamp() }); toast('✅ تمت الإضافة');
};

window.deleteSalaryDept = async function(deptId) {
  if (!confirm('حذف هذا القسم وكل بياناته؟')) return;
  // deep delete
  const emps = Object.values(employees[deptId]||{});
  const batch = writeBatch(db);
  for (const emp of emps) {
    Object.keys(emp.attendance||{}).forEach(aid => batch.delete(doc(db,'salaries',deptId,'employees',emp.id,'attendance',aid)));
    Object.keys(emp.advances||{}).forEach(aid => batch.delete(doc(db,'salaries',deptId,'employees',emp.id,'advances',aid)));
    batch.delete(doc(db,'salaries',deptId,'employees',emp.id));
  }
  batch.delete(doc(db,'salaries',deptId));
  await batch.commit(); toast('🗑 تم الحذف');
};

window.renameSalaryDept = function(deptId) {
  document.getElementById('snd-'+deptId).style.display='none';
  const inp = document.getElementById('sni-'+deptId);
  inp.style.display='inline-block'; inp.focus(); inp.select();
};
window.finishRenameSalaryDept = async function(deptId) {
  const inp = document.getElementById('sni-'+deptId);
  const newName = inp.value.trim();
  if (newName && pages.salaries[deptId] && newName !== pages.salaries[deptId].name) {
    await setDoc(doc(db,'salaries',deptId), { name: newName }, { merge: true }); toast('✏️ تم التعديل');
  }
  const nd = document.getElementById('snd-'+deptId);
  if (nd) { nd.textContent = pages.salaries[deptId]?.name||''; nd.style.display='inline'; inp.style.display='none'; }
};

// ---- EMPLOYEE CRUD ----
window.addEmployee = async function(deptId) {
  const name = document.getElementById('emp-name-'+deptId).value.trim();
  const daily = parseFloat(document.getElementById('emp-daily-'+deptId).value);
  const overtime = parseFloat(document.getElementById('emp-ot-'+deptId).value||0);
  if (!name || !daily) { alert('ادخل الاسم والسعر اليومي'); return; }
  await addDoc(collection(db,'salaries',deptId,'employees'), { name, dailyRate: daily, overtimeRate: overtime||0, createdAt: serverTimestamp() });
  document.getElementById('emp-name-'+deptId).value='';
  document.getElementById('emp-daily-'+deptId).value='';
  document.getElementById('emp-ot-'+deptId).value='';
  toast('👤 تمت إضافة الموظف');
};

window.deleteEmployee = async function(deptId, empId) {
  const emp = employees[deptId]?.[empId];
  if (!confirm('حذف "' + (emp?.name||'') + '"؟')) return;
  const batch = writeBatch(db);
  Object.keys(emp?.attendance||{}).forEach(aid => batch.delete(doc(db,'salaries',deptId,'employees',empId,'attendance',aid)));
  Object.keys(emp?.advances||{}).forEach(aid => batch.delete(doc(db,'salaries',deptId,'employees',empId,'advances',aid)));
  batch.delete(doc(db,'salaries',deptId,'employees',empId));
  await batch.commit(); toast('🗑 تم حذف الموظف');
};

// ---- ATTENDANCE ----
window.addAttendance = async function(deptId, empId) {
  const date   = document.getElementById('att-date-'+empId).value;
  const status = document.getElementById('att-status-'+empId).value;
  const start  = document.getElementById('att-start-'+empId).value;
  const end    = document.getElementById('att-end-'+empId).value;
  const ot     = parseFloat(document.getElementById('att-ot-'+empId).value||0);
  if (!date) { alert('اختر التاريخ'); return; }
  await setDoc(doc(db,'salaries',deptId,'employees',empId,'attendance',date), {
    date, status, startTime: start||'', endTime: end||'', overtime: ot||0, createdAt: serverTimestamp()
  }); toast('📅 تم تسجيل الحضور');
};

window.deleteAttendance = async function(deptId, empId, attId) {
  await deleteDoc(doc(db,'salaries',deptId,'employees',empId,'attendance',attId)); toast('🗑 تم الحذف');
};

// ---- ADVANCES ----
window.addAdvance = async function(deptId, empId) {
  const amt  = parseFloat(document.getElementById('adv-amt-'+empId).value);
  const note = document.getElementById('adv-note-'+empId).value.trim();
  if (!amt||amt<=0) { alert('ادخل مبلغ سلفة صحيح'); return; }
  await addDoc(collection(db,'salaries',deptId,'employees',empId,'advances'), {
    amount: amt, note, date: new Date().toLocaleDateString('ar-EG'), createdAt: serverTimestamp()
  });
  document.getElementById('adv-amt-'+empId).value='';
  document.getElementById('adv-note-'+empId).value='';
  toast('💸 تم إضافة السلفة');
};

window.deleteAdvance = async function(deptId, empId, advId) {
  await deleteDoc(doc(db,'salaries',deptId,'employees',empId,'advances',advId)); toast('🗑 تم الحذف');
};

// ==================== RENDER ====================
function showWelcome(section) {
  document.getElementById(section+'-welcome').style.display='flex';
}

function getBalance(page) {
  const entries = Object.values(page.entries||{});
  const buy = entries.filter(e=>e.type==='buy').reduce((s,e)=>s+e.amount,0);
  const pay = entries.filter(e=>e.type==='pay').reduce((s,e)=>s+e.amount,0);
  return { buy, pay, bal: buy-pay };
}

function renderSidebar() {
  const list = document.getElementById('pages-list');
  const sec = currentSection;

  if (sec === 'salaries') {
    const depts = Object.values(pages.salaries);
    if (!depts.length) { list.innerHTML='<p style="font-size:13px;color:#bbb;text-align:center;padding:1rem;">لا يوجد أقسام</p>'; return; }
    list.innerHTML = depts.map(p => {
      const empCount = Object.keys(employees[p.id]||{}).length;
      return `<div class="page-item ${p.id===currentPage.salaries?'active':''}" onclick="openPage('salaries','${p.id}')">
        <div class="page-item-left">
          <span class="page-item-name">${p.name}</span>
          <span class="page-item-bal">${empCount} موظف</span>
        </div>
        <button class="btn-del-page" onclick="event.stopPropagation();deleteSalaryDept('${p.id}')">×</button>
      </div>`;
    }).join('');
    return;
  }

  const pageArr = Object.values(pages[sec]);
  if (!pageArr.length) { list.innerHTML='<p style="font-size:13px;color:#bbb;text-align:center;padding:1rem;">لا يوجد بيانات</p>'; return; }
  list.innerHTML = pageArr.map(p => {
    const { bal } = getBalance(p);
    const balClass = bal>0?'pos':bal<0?'neg':'';
    const balText  = bal!==0?(bal>0?'متبقي: ':'زيادة: ')+fmt(Math.abs(bal)):'مسوّى';
    return `<div class="page-item ${p.id===currentPage[sec]?'active':''}" onclick="openPage('${sec}','${p.id}')">
      <div class="page-item-left">
        <span class="page-item-name">${p.name}</span>
        <span class="page-item-bal ${balClass}">${balText}</span>
      </div>
      <button class="btn-del-page" onclick="event.stopPropagation();deletePage('${sec}','${p.id}')">×</button>
    </div>`;
  }).join('');
}

window.openPage = function(section, id) {
  currentPage[section] = id;
  if (section !== currentSection) return;
  document.getElementById(section+'-welcome').style.display='none';
  document.querySelectorAll('#section-'+section+' .page-view').forEach(el=>el.classList.remove('active'));
  let el = document.getElementById(section+'-page-'+id);
  if (!el) {
    if (section==='salaries') renderSalaryPage(id);
    else renderPageContent(section, id);
    el = document.getElementById(section+'-page-'+id);
  }
  if (el) el.classList.add('active');
  renderSidebar();
  closeSidebar();
};

// ---- DEBTORS / CUSTOMERS page content ----
function renderPageContent(section, pageId) {
  const page = pages[section]?.[pageId]; if (!page) return;
  let el = document.getElementById(section+'-page-'+pageId);
  if (!el) {
    el = document.createElement('div');
    el.className='page-view'+(pageId===currentPage[section]?' active':'');
    el.id=section+'-page-'+pageId;
    document.getElementById(section+'-pages').appendChild(el);
  }
  const {buy,pay,bal} = getBalance(page);
  const balColor = bal>0?'#c0392b':bal<0?'#27ae60':'#1a1a1a';
  const entryArr = Object.values(page.entries).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
  const histHTML = entryArr.length===0
    ? '<p style="text-align:center;color:#bbb;padding:1.2rem;font-size:13px;">لا يوجد سجل</p>'
    : entryArr.map(e=>{
        const isBuy=e.type==='buy';
        return `<tr>
          <td><span class="badge ${isBuy?'badge-buy':'badge-pay'}">${isBuy?'شراء':'سداد'}</span></td>
          <td>${e.note||'—'}</td>
          <td>${e.time||''}</td>
          <td style="font-weight:600;color:${isBuy?'#c0392b':'#27ae60'}">${isBuy?'+':'-'}${fmt(e.amount)}</td>
          <td><button class="btn btn-sm" onclick="deleteEntry('${section}','${pageId}','${e.id}')">×</button></td>
        </tr>`;
      }).join('');

  el.innerHTML=`
    <div class="page-top">
      <span class="page-name-display" id="nd-${section}${pageId}" onclick="renamePage('${section}','${pageId}')">${page.name}</span>
      <input class="page-name-input" id="ni-${section}${pageId}" style="display:none" onblur="finishRename('${section}','${pageId}')" onkeydown="if(event.key==='Enter')finishRename('${section}','${pageId}')" />
      <span style="font-size:11px;color:#bbb;">(اضغط الاسم للتعديل)</span>
    </div>
    <div class="metrics">
      <div class="metric"><div class="metric-label">إجمالي الشراء</div><div class="metric-val red">${fmt(buy)}</div></div>
      <div class="metric"><div class="metric-label">إجمالي السداد</div><div class="metric-val green">${fmt(pay)}</div></div>
      <div class="metric"><div class="metric-label">المتبقي</div><div class="metric-val" style="color:${balColor}">${fmt(bal)}</div></div>
    </div>
    <div class="card">
      <div class="input-row">
        <input type="number" id="amt-${pageId}" placeholder="المبلغ" min="0" step="any" style="width:120px"/>
        <input type="text" id="note-${pageId}" placeholder="ملاحظة" style="flex:1;min-width:100px"/>
        <button class="btn btn-red" onclick="addEntry('${section}','${pageId}','buy')">+ شراء</button>
        <button class="btn btn-green" onclick="addEntry('${section}','${pageId}','pay')">✓ سداد</button>
      </div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <span style="font-size:14px;font-weight:500;">السجل</span>
        <button class="btn btn-sm" onclick="clearEntries('${section}','${pageId}')">🗑 مسح الكل</button>
      </div>
      ${entryArr.length===0?'<p style="text-align:center;color:#bbb;padding:1rem;font-size:13px;">لا يوجد سجل</p>':
        '<div class="tbl-wrap"><table><thead><tr><th>النوع</th><th>ملاحظة</th><th>التاريخ</th><th>المبلغ</th><th></th></tr></thead><tbody>'+histHTML+'</tbody></table></div>'}
    </div>`;
}

// ---- SALARY page ----
function calcEmpSalary(emp) {
  const attArr = Object.values(emp.attendance||{});
  const presentDays = attArr.filter(a=>a.status==='present').length;
  const totalOT = attArr.reduce((s,a)=>s+(parseFloat(a.overtime)||0),0);
  const totalAdvances = Object.values(emp.advances||{}).reduce((s,a)=>s+(parseFloat(a.amount)||0),0);
  const baseSalary = presentDays * (emp.dailyRate||0);
  const otPay = totalOT * (emp.overtimeRate||0);
  const net = baseSalary + otPay - totalAdvances;
  return { presentDays, totalOT, baseSalary, otPay, totalAdvances, net };
}

function renderSalaryPage(deptId) {
  const dept = pages.salaries[deptId]; if (!dept) return;
  let el = document.getElementById('salaries-page-'+deptId);
  if (!el) {
    el = document.createElement('div');
    el.className='page-view'+(deptId===currentPage.salaries?' active':'');
    el.id='salaries-page-'+deptId;
    document.getElementById('salaries-pages').appendChild(el);
  }

  const empArr = Object.values(employees[deptId]||{}).sort((a,b)=>(a.createdAt?.seconds||0)-(b.createdAt?.seconds||0));

  const empsHTML = empArr.map(emp => {
    const { presentDays, totalOT, baseSalary, otPay, totalAdvances, net } = calcEmpSalary(emp);
    const attArr = Object.values(emp.attendance||{}).sort((a,b)=>a.date>b.date?-1:1);
    const advArr = Object.values(emp.advances||{}).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));

    const attRows = attArr.map(a => `<tr>
      <td>${a.date}</td>
      <td><span class="badge ${a.status==='present'?'badge-present':'badge-absent'}">${a.status==='present'?'حضور':'غياب'}</span></td>
      <td>${a.startTime||'—'}</td><td>${a.endTime||'—'}</td>
      <td>${a.overtime||0} س</td>
      <td><button class="btn btn-sm" onclick="deleteAttendance('${deptId}','${emp.id}','${a.id}')">×</button></td>
    </tr>`).join('');

    const advRows = advArr.map(a => `<tr>
      <td>${a.date||''}</td><td>${fmt(a.amount)}</td><td>${a.note||'—'}</td>
      <td><button class="btn btn-sm" onclick="deleteAdvance('${deptId}','${emp.id}','${a.id}')">×</button></td>
    </tr>`).join('');

    return `<div class="emp-card">
      <div class="emp-card-header" onclick="toggleEmpCard('${emp.id}')">
        <div>
          <div class="emp-card-name">👤 ${emp.name}</div>
          <div class="emp-card-summary">يومية: ${fmt(emp.dailyRate)} | حضور: ${presentDays} يوم | صافي المرتب: <strong style="color:${net>=0?'#27ae60':'#c0392b'}">${fmt(net)}</strong></div>
        </div>
        <div style="display:flex;gap:6px;align-items:center;">
          <button class="btn btn-sm" onclick="event.stopPropagation();deleteEmployee('${deptId}','${emp.id}')">حذف</button>
          <span style="color:#aaa;font-size:18px;" id="emp-arrow-${emp.id}">▾</span>
        </div>
      </div>
      <div class="emp-card-body" id="emp-body-${emp.id}">
        <div class="emp-meta">
          <span>اليومية: ${fmt(emp.dailyRate)}</span>
          <span>سعر الأوفرتايم/ساعة: ${fmt(emp.overtimeRate)}</span>
          <span>أيام حضور: ${presentDays}</span>
          <span>أوفرتايم: ${totalOT} ساعة (+${fmt(otPay)})</span>
          <span>سلف: ${fmt(totalAdvances)}</span>
          <span style="font-weight:600;color:${net>=0?'#27ae60':'#c0392b'}">صافي المرتب: ${fmt(net)}</span>
        </div>

        <!-- ADD ATTENDANCE -->
        <div class="card" style="margin-bottom:.75rem;">
          <div class="card-title">📅 تسجيل حضور / غياب</div>
          <div class="input-row" style="flex-wrap:wrap;gap:6px;">
            <input type="date" id="att-date-${emp.id}" style="width:140px"/>
            <select id="att-status-${emp.id}" style="width:100px">
              <option value="present">حضور</option>
              <option value="absent">غياب</option>
            </select>
            <input type="time" id="att-start-${emp.id}" placeholder="بداية" style="width:110px"/>
            <input type="time" id="att-end-${emp.id}" placeholder="نهاية" style="width:110px"/>
            <input type="number" id="att-ot-${emp.id}" placeholder="أوفرتايم (ساعات)" min="0" step="0.5" style="width:150px"/>
            <button class="btn btn-dark" onclick="addAttendance('${deptId}','${emp.id}')">تسجيل</button>
          </div>
        </div>

        <!-- ATTENDANCE TABLE -->
        ${attArr.length?'<div class="card" style="margin-bottom:.75rem;"><div class="card-title">سجل الحضور</div><div class="tbl-wrap"><table><thead><tr><th>التاريخ</th><th>الحالة</th><th>بداية</th><th>نهاية</th><th>أوفرتايم</th><th></th></tr></thead><tbody>'+attRows+'</tbody></table></div></div>':''}

        <!-- ADD ADVANCE -->
        <div class="card" style="margin-bottom:.75rem;">
          <div class="card-title">💸 إضافة سلفة</div>
          <div class="input-row">
            <input type="number" id="adv-amt-${emp.id}" placeholder="المبلغ" min="0" style="width:120px"/>
            <input type="text" id="adv-note-${emp.id}" placeholder="ملاحظة" style="flex:1;min-width:100px"/>
            <button class="btn btn-red" onclick="addAdvance('${deptId}','${emp.id}')">+ سلفة</button>
          </div>
        </div>

        <!-- ADVANCES TABLE -->
        ${advArr.length?'<div class="card"><div class="card-title">سجل السلف</div><div class="tbl-wrap"><table><thead><tr><th>التاريخ</th><th>المبلغ</th><th>ملاحظة</th><th></th></tr></thead><tbody>'+advRows+'</tbody></table></div></div>':''}
      </div>
    </div>`;
  }).join('');

  el.innerHTML=`
    <div class="page-top">
      <span class="page-name-display" id="snd-${deptId}" onclick="renameSalaryDept('${deptId}')">${dept.name}</span>
      <input class="page-name-input" id="sni-${deptId}" style="display:none" onblur="finishRenameSalaryDept('${deptId}')" onkeydown="if(event.key==='Enter')finishRenameSalaryDept('${deptId}')" />
    </div>

    <!-- ADD EMPLOYEE -->
    <div class="card" style="margin-bottom:1.25rem;">
      <div class="card-title">👤 إضافة موظف جديد</div>
      <div class="input-row">
        <input type="text" id="emp-name-${deptId}" placeholder="اسم الموظف" style="flex:1;min-width:120px"/>
        <input type="number" id="emp-daily-${deptId}" placeholder="اليومية" min="0" style="width:110px"/>
        <input type="number" id="emp-ot-${deptId}" placeholder="سعر الأوفرتايم/ساعة" min="0" style="width:160px"/>
        <button class="btn btn-dark" onclick="addEmployee('${deptId}')">إضافة</button>
      </div>
    </div>

    ${empArr.length===0?'<p style="text-align:center;color:#bbb;padding:2rem;font-size:14px;">لا يوجد موظفين بعد</p>':empsHTML}
  `;
}

window.toggleEmpCard = function(empId) {
  const body  = document.getElementById('emp-body-'+empId);
  const arrow = document.getElementById('emp-arrow-'+empId);
  if (!body) return;
  body.classList.toggle('open');
  if (arrow) arrow.textContent = body.classList.contains('open') ? '▴' : '▾';
};

listenSection('customers');
listenSalaryDepts();
