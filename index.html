<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تتبع الحسابات</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      background: #f2f2f2;
      color: #1a1a1a;
      min-height: 100vh;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      position: fixed;
      top: 0; right: 0;
      width: 240px;
      height: 100vh;
      background: #fff;
      border-left: 1px solid #e5e5e5;
      display: flex;
      flex-direction: column;
      z-index: 100;
    }

    .sidebar-header {
      padding: 1.25rem 1rem 1rem;
      border-bottom: 1px solid #f0f0f0;
    }

    .sidebar-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .btn-new-page {
      width: 100%;
      padding: 8px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
    }
    .btn-new-page:hover { background: #333; }

    .pages-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .page-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      margin-bottom: 2px;
      transition: background 0.1s;
    }

    .page-item:hover { background: #f5f5f5; }
    .page-item.active { background: #f0f0f0; font-weight: 500; }

    .page-item-left { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
    .page-item-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .page-item-bal { font-size: 11px; color: #888; }
    .page-item-bal.pos { color: #c0392b; }
    .page-item-bal.neg { color: #27ae60; }

    .btn-del-page {
      background: none;
      border: none;
      cursor: pointer;
      color: #ccc;
      font-size: 16px;
      padding: 2px 4px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .btn-del-page:hover { color: #e74c3c; background: #fff0ef; }

    .sidebar-footer {
      padding: 10px;
      border-top: 1px solid #f0f0f0;
      font-size: 12px;
      color: #bbb;
      text-align: center;
    }

    /* ===== MAIN ===== */
    .main {
      margin-right: 240px;
      padding: 2rem 1.5rem;
      min-height: 100vh;
    }

    .page-view { display: none; }
    .page-view.active { display: block; }

    .page-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.5rem;
    }

    .page-name-display {
      font-size: 20px;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 2px dashed transparent;
      padding-bottom: 2px;
    }
    .page-name-display:hover { border-color: #ddd; }

    .page-name-input {
      font-size: 20px;
      font-weight: 600;
      border: none;
      border-bottom: 2px solid #1a1a1a;
      outline: none;
      background: transparent;
      font-family: inherit;
      color: #1a1a1a;
      width: 200px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 1.5rem;
    }

    .metric {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      padding: 1rem;
      text-align: center;
    }

    .metric-label { font-size: 12px; color: #888; margin-bottom: 6px; }
    .metric-val { font-size: 22px; font-weight: 600; }
    .metric-val.buy  { color: #c0392b; }
    .metric-val.pay  { color: #27ae60; }

    .card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
    }

    .input-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    input[type="number"], input[type="text"] {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 14px;
      outline: none;
      background: #fafafa;
      color: #1a1a1a;
      font-family: inherit;
    }
    input[type="number"] { width: 130px; }
    input[type="text"]   { flex: 1; min-width: 120px; }
    input:focus { border-color: #aaa; background: #fff; }

    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid #ddd;
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
      background: #fff;
      color: #1a1a1a;
    }
    .btn:hover { background: #f5f5f5; }
    .btn-buy  { border-color: #e74c3c; color: #c0392b; }
    .btn-buy:hover  { background: #fff0ef; }
    .btn-pay  { border-color: #2ecc71; color: #27ae60; }
    .btn-pay:hover  { background: #edfbf3; }
    .btn-sm   { font-size: 12px; padding: 4px 10px; color: #999; border-color: #e5e5e5; }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .history-header span { font-size: 14px; font-weight: 500; }

    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #f5f5f5;
      font-size: 14px;
    }
    .history-item:last-child { border-bottom: none; }

    .item-left  { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .item-right { display: flex; align-items: center; gap: 10px; }

    .badge { display: inline-block; font-size: 12px; font-weight: 500; padding: 3px 10px; border-radius: 6px; }
    .badge-buy { background: #fff0ef; color: #c0392b; }
    .badge-pay { background: #edfbf3; color: #27ae60; }

    .item-note { color: #888; font-size: 13px; }
    .item-time { color: #bbb; font-size: 12px; }
    .item-amount { font-weight: 600; }
    .item-amount.buy { color: #c0392b; }
    .item-amount.pay { color: #27ae60; }

    .btn-del-entry {
      background: none; border: none; cursor: pointer;
      color: #ccc; font-size: 18px; line-height: 1; padding: 0 4px;
    }
    .btn-del-entry:hover { color: #e74c3c; }

    .empty { text-align: center; color: #bbb; font-size: 14px; padding: 1.5rem 0; }

    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 60vh;
      color: #bbb;
      text-align: center;
      gap: 12px;
    }
    .welcome h2 { font-size: 18px; font-weight: 500; color: #888; }
    .welcome p  { font-size: 14px; }

    /* Mobile */
    .mobile-menu-btn {
      display: none;
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 200;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 18px;
      cursor: pointer;
    }

    @media (max-width: 640px) {
      .sidebar {
        transform: translateX(100%);
        transition: transform 0.2s;
      }
      .sidebar.open { transform: translateX(0); }
      .main { margin-right: 0; padding: 1rem; padding-top: 3.5rem; }
      .mobile-menu-btn { display: block; }
      .metrics { grid-template-columns: 1fr 1fr; }
      .metric:last-child { grid-column: span 2; }
      .input-row { flex-direction: column; align-items: stretch; }
      input[type="number"] { width: 100%; }
    }
  </style>
</head>
<body>

<button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>

<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-title">📋 الحسابات</div>
    <button class="btn-new-page" onclick="newPage()">+ إضافة حساب جديد</button>
  </div>
  <div class="pages-list" id="pages-list"></div>
  <div class="sidebar-footer">البيانات محفوظة على جهازك</div>
</div>

<div class="main" id="main">
  <div id="welcome" class="welcome">
    <h2>أهلاً بك 👋</h2>
    <p>اضغط على "إضافة حساب جديد" لتبدأ</p>
  </div>
  <div id="pages-container"></div>
</div>

<script>
  let data = JSON.parse(localStorage.getItem('accounts_data') || '{"pages":[]}');
  let currentPageId = null;

  function save() {
    localStorage.setItem('accounts_data', JSON.stringify(data));
  }

  function fmt(n) { return Number(n).toLocaleString('ar-EG'); }

  function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

  function newPage() {
    const name = prompt('اسم الحساب الجديد:');
    if (!name || !name.trim()) return;
    const page = { id: genId(), name: name.trim(), entries: [] };
    data.pages.push(page);
    save();
    renderSidebar();
    openPage(page.id);
    closeSidebar();
  }

  function deletePage(id) {
    const page = data.pages.find(p => p.id === id);
    if (!page) return;
    if (!confirm(`هتحذف حساب "${page.name}"؟`)) return;
    data.pages = data.pages.filter(p => p.id !== id);
    save();
    if (currentPageId === id) {
      currentPageId = null;
      document.getElementById('welcome').style.display = 'flex';
    }
    renderSidebar();
    renderPages();
  }

  function openPage(id) {
    currentPageId = id;
    document.getElementById('welcome').style.display = 'none';
    document.querySelectorAll('.page-view').forEach(el => el.classList.remove('active'));
    const el = document.getElementById('page-' + id);
    if (el) el.classList.add('active');
    renderSidebar();
  }

  function renamePage(id) {
    const page = data.pages.find(p => p.id === id);
    if (!page) return;
    const nameDisplay = document.getElementById('name-display-' + id);
    const nameInput   = document.getElementById('name-input-' + id);
    nameDisplay.style.display = 'none';
    nameInput.style.display   = 'inline-block';
    nameInput.value = page.name;
    nameInput.focus();
    nameInput.select();
  }

  function finishRename(id) {
    const page = data.pages.find(p => p.id === id);
    if (!page) return;
    const nameInput = document.getElementById('name-input-' + id);
    const newName = nameInput.value.trim();
    if (newName) page.name = newName;
    save();
    renderSidebar();
    document.getElementById('name-display-' + id).textContent = page.name;
    document.getElementById('name-display-' + id).style.display = 'inline';
    nameInput.style.display = 'none';
  }

  function addEntry(pageId, type) {
    const page = data.pages.find(p => p.id === pageId);
    if (!page) return;
    const amt  = parseFloat(document.getElementById('amt-' + pageId).value);
    const note = document.getElementById('note-' + pageId).value.trim();
    if (!amt || amt <= 0) { alert('من فضلك ادخل مبلغ صحيح'); return; }
    page.entries.push({
      id: genId(), type, amount: amt, note,
      time: new Date().toLocaleString('ar-EG', { hour:'2-digit', minute:'2-digit', day:'2-digit', month:'2-digit' })
    });
    document.getElementById('amt-' + pageId).value  = '';
    document.getElementById('note-' + pageId).value = '';
    save();
    renderPageContent(pageId);
    renderSidebar();
  }

  function deleteEntry(pageId, entryId) {
    const page = data.pages.find(p => p.id === pageId);
    if (!page) return;
    page.entries = page.entries.filter(e => e.id !== entryId);
    save();
    renderPageContent(pageId);
    renderSidebar();
  }

  function clearPageEntries(pageId) {
    const page = data.pages.find(p => p.id === pageId);
    if (!page || page.entries.length === 0) return;
    if (!confirm('هتمسح كل السجل؟')) return;
    page.entries = [];
    save();
    renderPageContent(pageId);
    renderSidebar();
  }

  function getBalance(page) {
    const buy = page.entries.filter(e => e.type === 'buy').reduce((s,e) => s + e.amount, 0);
    const pay = page.entries.filter(e => e.type === 'pay').reduce((s,e) => s + e.amount, 0);
    return { buy, pay, bal: buy - pay };
  }

  function renderSidebar() {
    const list = document.getElementById('pages-list');
    if (data.pages.length === 0) {
      list.innerHTML = '<p style="font-size:13px;color:#bbb;text-align:center;padding:1rem;">لا يوجد حسابات بعد</p>';
      return;
    }
    list.innerHTML = data.pages.map(p => {
      const { bal } = getBalance(p);
      const balClass = bal > 0 ? 'pos' : bal < 0 ? 'neg' : '';
      const balText  = bal !== 0 ? (bal > 0 ? 'متبقي: ' : 'زيادة سداد: ') + fmt(Math.abs(bal)) : 'مسوّى';
      return `
        <div class="page-item ${p.id === currentPageId ? 'active' : ''}" onclick="openPage('${p.id}'); closeSidebar();">
          <div class="page-item-left">
            <span class="page-item-name">${p.name}</span>
            <span class="page-item-bal ${balClass}">${balText}</span>
          </div>
          <button class="btn-del-page" onclick="event.stopPropagation(); deletePage('${p.id}')" title="حذف">×</button>
        </div>`;
    }).join('');
  }

  function renderPages() {
    const container = document.getElementById('pages-container');
    container.innerHTML = data.pages.map(p => `<div class="page-view ${p.id === currentPageId ? 'active' : ''}" id="page-${p.id}"></div>`).join('');
    data.pages.forEach(p => renderPageContent(p.id));
  }

  function renderPageContent(pageId) {
    const page = data.pages.find(p => p.id === pageId);
    if (!page) return;
    let el = document.getElementById('page-' + pageId);
    if (!el) {
      el = document.createElement('div');
      el.className = 'page-view' + (pageId === currentPageId ? ' active' : '');
      el.id = 'page-' + pageId;
      document.getElementById('pages-container').appendChild(el);
    }

    const { buy, pay, bal } = getBalance(page);
    const balColor = bal > 0 ? '#c0392b' : bal < 0 ? '#27ae60' : '#1a1a1a';

    const historyHTML = page.entries.length === 0
      ? '<p class="empty">لا يوجد سجل بعد</p>'
      : [...page.entries].reverse().map(e => {
          const isBuy = e.type === 'buy';
          return `
            <div class="history-item">
              <div class="item-left">
                <span class="badge ${isBuy ? 'badge-buy' : 'badge-pay'}">${isBuy ? 'شراء' : 'سداد'}</span>
                ${e.note ? `<span class="item-note">${e.note}</span>` : ''}
                <span class="item-time">${e.time}</span>
              </div>
              <div class="item-right">
                <span class="item-amount ${isBuy ? 'buy' : 'pay'}">${isBuy ? '+' : '-'}${fmt(e.amount)}</span>
                <button class="btn-del-entry" onclick="deleteEntry('${pageId}','${e.id}')" title="حذف">×</button>
              </div>
            </div>`;
        }).join('');

    el.innerHTML = `
      <div class="page-top">
        <span class="page-name-display" id="name-display-${pageId}" onclick="renamePage('${pageId}')" title="اضغط للتعديل">${page.name}</span>
        <input class="page-name-input" id="name-input-${pageId}" style="display:none"
          onblur="finishRename('${pageId}')"
          onkeydown="if(event.key==='Enter') finishRename('${pageId}')" />
        <span style="font-size:12px;color:#bbb;">(اضغط الاسم للتعديل)</span>
      </div>

      <div class="metrics">
        <div class="metric">
          <div class="metric-label">إجمالي الشراء</div>
          <div class="metric-val buy">${fmt(buy)}</div>
        </div>
        <div class="metric">
          <div class="metric-label">إجمالي السداد</div>
          <div class="metric-val pay">${fmt(pay)}</div>
        </div>
        <div class="metric">
          <div class="metric-label">المتبقي</div>
          <div class="metric-val" style="color:${balColor}">${fmt(bal)}</div>
        </div>
      </div>

      <div class="card">
        <div class="input-row">
          <input type="number" id="amt-${pageId}"  placeholder="المبلغ" min="0" step="any" />
          <input type="text"   id="note-${pageId}" placeholder="ملاحظة (اختياري)" />
          <button class="btn btn-buy" onclick="addEntry('${pageId}','buy')">+ شراء</button>
          <button class="btn btn-pay" onclick="addEntry('${pageId}','pay')">✓ سداد</button>
        </div>
      </div>

      <div class="card">
        <div class="history-header">
          <span>السجل</span>
          <button class="btn btn-sm" onclick="clearPageEntries('${pageId}')">🗑 مسح الكل</button>
        </div>
        <div>${historyHTML}</div>
      </div>`;
  }

  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
  }

  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
  }

  // Init
  renderSidebar();
  renderPages();
  if (data.pages.length > 0) openPage(data.pages[0].id);
</script>
</body>
</html>
